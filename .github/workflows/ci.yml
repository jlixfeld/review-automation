name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20

      - name: Run tests
        run: npm test

      - name: Parse workflow YAML
        run: >-
          ruby -e 'require "yaml";
          ARGV.each { |path| YAML.load_file(path, aliases: true) }'
          .github/workflows/*.yml templates/*.yml action.yml
